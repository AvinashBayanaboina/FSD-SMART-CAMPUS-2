spring.application.name=event-management

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campus_events?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logout redirect
spring.security.logout.success-url=/

# Multipart config
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# H2 Console (Disabled since we shifted to MySQL)
spring.h2.console.enabled=false

