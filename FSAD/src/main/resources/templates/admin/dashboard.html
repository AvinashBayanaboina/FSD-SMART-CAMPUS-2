<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin Dashboard')}"></head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <main class="container" style="margin-top: 3rem;">
        <div class="admin-header">
            <div>
                <h1>Management Command Center</h1>
                <p style="color: var(--text-muted);">Monitor and manage all campus events.</p>
            </div>
            <a th:href="@{/admin/event/new}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Create New Event
            </a>
        </div>

        <div class="glass" style="padding: 1rem; margin-bottom: 2rem; border-radius: 1rem;">
            <form th:action="@{/admin/dashboard}" method="get" style="display: flex; gap: 1rem; align-items: flex-end;">
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label style="font-size: 0.8rem;">Department</label>
                    <input type="text" name="dept" th:value="${param.dept}" class="form-control" placeholder="Search department...">
                </div>
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label style="font-size: 0.8rem;">Event Type</label>
                    <select name="type" class="form-control">
                        <option value="">All Types</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${#strings.equals(param.type, t)}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Filter Results</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline">Reset</a>
            </form>
        </div>

        <div class="stats-grid">
            <div class="stat-card glass animate-in">
                <div class="stat-value" th:text="${totalEvents}">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card glass animate-in" style="animation-delay: 0.1s">
                <div class="stat-value" th:text="${totalRegistrations}">0</div>
                <div class="stat-label">Total Registrations</div>
            </div>
            <div class="stat-card glass animate-in" style="animation-delay: 0.2s">
                <div class="stat-value" th:text="${totalEvents > 0 ? totalRegistrations / totalEvents : 0}">0</div>
                <div class="stat-label">Avg. Reg / Event</div>
            </div>
        </div>

        <!-- Registration Chart Section -->
        <div class="glass animate-in" style="padding: 2rem; margin-bottom: 3rem; border-radius: 1.5rem; height: 400px; display: flex; flex-direction: column;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Registration Breakdown</h3>
            <div style="flex-grow: 1; min-height: 0;">
                <canvas id="registrationChart"></canvas>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            /*<![CDATA[*/
            const eventsData = /*[[${events}]]*/ [];
            
            const ctx = document.getElementById('registrationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: eventsData.map(e => e.title),
                    datasets: [{
                        label: 'Current Registrations',
                        data: eventsData.map(e => e.currentRegistrations),
                        backgroundColor: '#4f46e5',
                        borderRadius: 8,
                        borderSkipped: false,
                    }, {
                        label: 'Remaining Capacity',
                        data: eventsData.map(e => e.capacity - e.currentRegistrations),
                        backgroundColor: '#e2e8f0',
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });
            /*]]>*/
        </script>

        <div th:if="${success}" class="glass" style="padding: 1rem; margin-bottom: 2rem; border-left: 4px solid #10b981; color: #059669;">
            <i class="fas fa-check-circle"></i> <span th:text="${success}">Success message</span>
        </div>

        <div class="glass" style="padding: 1.5rem; border-radius: 1rem; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Department</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Reg / Cap</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.title}" style="font-weight: 500;">Title</td>
                        <td th:text="${event.department}">Dept</td>
                        <td>
                            <span class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" th:text="${event.eventType}">Type</span>
                        </td>
                        <td th:text="${#temporals.format(event.dateTime, 'MMM dd, HH:mm')}">Date</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <span th:text="${event.currentRegistrations + '/' + event.capacity}">12/50</span>
                                <div style="width: 60px; height: 6px; background: var(--background); border-radius: 3px; overflow: hidden;">
                                    <div th:style="'width: ' + (${event.currentRegistrations * 100 / event.capacity}) + '%; height: 100%; background: var(--primary);'"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div style="display: flex; gap: 0.75rem;">
                                <a th:href="@{'/admin/event/registrations/' + ${event.id}}" title="View Registrations" style="color: var(--text-muted);"><i class="fas fa-list"></i></a>
                                <a th:href="@{'/admin/event/edit/' + ${event.id}}" title="Edit" style="color: var(--primary);"><i class="fas fa-edit"></i></a>
                                <a th:href="@{'/admin/event/delete/' + ${event.id}}" title="Delete" style="color: #ef4444;" 
                                   onclick="return confirm('Are you sure you want to delete this event?')"><i class="fas fa-trash"></i></a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
