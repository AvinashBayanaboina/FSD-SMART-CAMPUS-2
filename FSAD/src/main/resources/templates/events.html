<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('All Events')}"></head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <main class="container">
        <header style="margin: 3rem 0; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 2rem;">
            <div>
                <h1 style="font-size: 2.5rem;">Browse Events</h1>
                <p style="color: var(--text-muted);">Find the perfect event for your skills and interests.</p>
            </div>
            
            <form th:action="@{/events}" method="get" class="glass" style="padding: 1rem; border-radius: 1rem; display: flex; gap: 1rem; align-items: center;">
                <div class="form-group" style="margin-bottom: 0;">
                    <input type="text" name="dept" th:value="${param.dept}" class="form-control" placeholder="Search by Dept...">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i> Filter
                </button>
            </form>
        </header>

        <div th:if="${success}" class="glass" style="padding: 1rem; margin-bottom: 2rem; border-left: 4px solid #10b981; color: #059669;">
            <i class="fas fa-check-circle"></i> <span th:text="${success}">Success message</span>
        </div>

        <div class="event-grid">
            <div th:each="event : ${events}" class="event-card glass animate-in">
                <img th:if="${event.imageUrl != null}" th:src="${event.imageUrl}" class="event-image" alt="Event Poster">
                <div class="event-content">
                    <div class="event-tag" th:text="${event.eventType}">Workshop</div>
                    <h3 class="event-title" th:text="${event.title}">Event Title</h3>
                    <p class="event-info" th:text="${event.description}">Description...</p>
                    <div class="event-meta">
                        <span><i class="far fa-calendar"></i> <span th:text="${#temporals.format(event.dateTime, 'MMM dd, yyyy HH:mm')}">Date</span></span>
                        <span><i class="fas fa-building"></i> <span th:text="${event.department}">Dept</span></span>
                        <span><i class="fas fa-map-marker-alt"></i> <span th:text="${event.location}">Loc</span></span>
                        <span><i class="fas fa-users"></i> <span th:text="${event.currentRegistrations + '/' + event.capacity}">12/50</span></span>
                    </div>
                    <a th:href="@{'/register/' + ${event.id}}" class="btn btn-primary" 
                       th:classappend="${event.currentRegistrations >= event.capacity} ? 'disabled' : ''"
                       th:style="${event.currentRegistrations >= event.capacity} ? 'opacity: 0.5; pointer-events: none;' : ''"
                       style="margin-top: 1.5rem; width: 100%; text-align: center;">
                       <span th:text="${event.currentRegistrations >= event.capacity} ? 'Fully Booked' : 'Register Now'">Register Now</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
