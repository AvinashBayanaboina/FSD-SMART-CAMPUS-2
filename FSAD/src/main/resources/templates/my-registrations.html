<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Registrations')}"></head>
<body>
    <div th:replace="~{layout :: navbar}"></div>

    <main class="container" style="margin-top: 4rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem;">My Registered Events</h1>
            <p style="color: var(--text-muted);">Enter your email to see your workshop and seminar registrations.</p>
        </div>

        <div class="glass animate-in" style="max-width: 600px; margin: 0 auto 3rem; padding: 2rem; border-radius: 1.5rem;">
            <form th:action="@{/my-registrations}" method="get" style="display: flex; gap: 1rem;">
                <input type="email" name="email" th:value="${searchedEmail}" class="form-control" placeholder="your.email@fsd.in" pattern=".*@fsd\.in$" title="Email must end with @fsd.in" required>
                <button type="submit" class="btn btn-primary" style="padding: 0 2rem;">Search</button>
            </form>
            <div th:if="${error}" style="color: #ef4444; font-size: 0.9rem; margin-top: 1rem; text-align: left;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error message</span>
            </div>
        </div>

        <div th:if="${registrations != null}" class="animate-in" style="animation-delay: 0.2s">
            <h2 th:text="'Results for: ' + ${searchedEmail}" style="margin-bottom: 2rem; font-size: 1.25rem;">Email Results</h2>
            
            <div class="event-grid">
                <div th:each="reg : ${registrations}" class="event-card glass">
                    <div class="event-tag" th:text="${reg.event.eventType}">Workshop</div>
                    <h3 class="event-title" th:text="${reg.event.title}">Event Title</h3>
                    <div class="event-meta">
                        <span><i class="far fa-calendar"></i> <span th:text="${#temporals.format(reg.event.dateTime, 'MMM dd, HH:mm')}">Date</span></span>
                        <span><i class="fas fa-map-marker-alt"></i> <span th:text="${reg.event.location}">Location</span></span>
                    </div>
                    <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(16, 185, 129, 0.1); border-radius: 0.75rem; color: #059669; font-size: 0.85rem; text-align: center;">
                        <i class="fas fa-check-circle"></i> Confirmed for <span th:text="${reg.studentName}">Student</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(registrations)}" class="glass" style="padding: 4rem; text-align: center; border-radius: 1rem;">
                <i class="fas fa-search" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                <p>No registrations found for this email address.</p>
            </div>
        </div>
    </main>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
